services:
  minio:
    ports: !override []

  mailpit:
    ports: !override []

  migrate:
    image: twitter-2020-app:latest
    build: !reset null
    command: [pnpm, db:migrate]
    environment: &codespaces-public-environment
      APP_URL: ${CODESPACES_APP_URL:?Codespaces app URL was not generated}
      # GitHub's public port tunnel rewrites same-origin requests to this
      # internal HTTPS origin before forwarding them to the Codespace.
      BETTER_AUTH_TRUSTED_ORIGINS: ${CODESPACES_APP_URL:?Codespaces app URL was not generated},https://localhost:80
      AUTH_REQUIRE_EMAIL_VERIFICATION: 'false'
      S3_PUBLIC_URL: ${CODESPACES_APP_URL:?Codespaces app URL was not generated}/media
      MEDIA_MAX_IMAGE_BYTES: '10485760'
      MEDIA_MAX_VIDEO_BYTES: '52428800'
      MEDIA_PRESIGN_LIMIT: '30'

  web:
    image: twitter-2020-app:latest
    build: !reset null
    command: [pnpm, --filter, '@twitter2020/web', start]
    environment: *codespaces-public-environment

  worker:
    image: twitter-2020-app:latest
    build: !reset null
    command: [pnpm, --filter, '@twitter2020/worker', start]
    environment: *codespaces-public-environment

  realtime:
    image: twitter-2020-app:latest
    build: !reset null
    command: [pnpm, --filter, '@twitter2020/realtime', start]
    environment: *codespaces-public-environment
