name: twitter-2020

x-app-environment: &app-environment
  NODE_ENV: production
  APP_URL: http://localhost
  MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
  MAINTENANCE_STATE_FILE: /app/.runtime/maintenance
  DATABASE_URL: postgresql://twitter:twitter@postgres:5432/twitter
  REDIS_URL: redis://redis:6379
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
  BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
  AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-true}
  REALTIME_SHARED_SECRET: ${REALTIME_SHARED_SECRET:?Set REALTIME_SHARED_SECRET in .env}
  INTERNAL_API_URL: http://web:3000
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_BUCKET: twitter-media
  S3_PRIVATE_BUCKET: twitter-private
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-twitter}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
  S3_PUBLIC_URL: http://localhost/media
  MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-15728640}
  MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-536870912}
  MEDIA_PRESIGN_LIMIT: ${MEDIA_PRESIGN_LIMIT:-120}
  SMTP_HOST: mailpit
  SMTP_PORT: 1025
  SMTP_FROM: Twitter <no-reply@twitter.local>
  GIPHY_API_KEY: ${GIPHY_API_KEY:-}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: twitter
      POSTGRES_USER: twitter
      POSTGRES_PASSWORD: twitter
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U twitter -d twitter]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-twitter}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
    volumes:
      - minio-data:/data
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio-cors.xml:/config/cors.xml:ro
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-twitter} ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env};
      mc mb --ignore-existing local/twitter-media;
      mc mb --ignore-existing local/twitter-private;
      mc cors set local/twitter-media /config/cors.xml;
      mc cors set local/twitter-private /config/cors.xml;
      mc anonymous set download local/twitter-media;"
    restart: no

  mailpit:
    image: axllent/mailpit@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    ports:
      - 8025:8025
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: build
    environment: *app-environment
    command: pnpm db:migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  web:
    build:
      context: .
      target: web
    environment: *app-environment
    volumes:
      - ./.runtime:/app/.runtime:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:3000/api/health/live]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  realtime:
    build:
      context: .
      target: realtime
    environment:
      <<: *app-environment
      REALTIME_PORT: 3001
    volumes:
      - ./.runtime:/app/.runtime:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:3001/health/ready]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - 80:80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      web:
        condition: service_healthy
      realtime:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
